name: Security Audit

on:
  schedule:
    - cron: "15 21 * * *" # 06:15 JST
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CONOHA_HOST: ${{ secrets.CONOHA_HOST }}
      CONOHA_SSH_KEY: ${{ secrets.CONOHA_SSH_KEY }}
      CONOHA_USER: ${{ secrets.CONOHA_USER }}
      REQUIRE_CERTBOT_TIMER: ${{ secrets.REQUIRE_CERTBOT_TIMER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve audit mode
        id: mode
        run: |
          if [[ -z "${CONOHA_HOST}" || -z "${CONOHA_SSH_KEY}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare SSH key
        if: ${{ steps.mode.outputs.enabled == 'true' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${CONOHA_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${CONOHA_HOST}" >> ~/.ssh/known_hosts

      - name: Skip when secrets are missing
        if: ${{ steps.mode.outputs.enabled != 'true' }}
        run: |
          echo "CONOHA_HOST / CONOHA_SSH_KEY secrets are required."
          echo "Skipping remote audit."
          exit 0

      - name: Run daily security audit
        if: ${{ steps.mode.outputs.enabled == 'true' }}
        env:
          TARGET_HOST: ${{ env.CONOHA_HOST }}
          TARGET_USER: ${{ env.CONOHA_USER }}
          REQUIRE_CERTBOT_TIMER: ${{ env.REQUIRE_CERTBOT_TIMER }}
          AUDIT_REPORT_DIR: ./audit-reports
          RETAIN_REPORTS: "14"
          MAX_FAILED: "0"
          MAX_NEW_FAILURES: "0"
        run: npm run ops:security-audit:daily

      - name: Upload audit artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-artifacts
          path: audit-reports/
          if-no-files-found: ignore
