# WordPress on ConoHa VPS (PHP-FPM + Nginx)
# Place at: /etc/nginx/sites-available/hutaroblog-wordpress
# Enable with symlink in /etc/nginx/sites-enabled/

server {
  listen 80;
  listen [::]:80;
  server_name hutaroblog.com;

  # Keep ACME challenge reachable for certbot renew
  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name hutaroblog.com;

  root /var/www/hutaroblog/wordpress;
  index index.php index.html;

  # Reuse existing cert if already issued
  ssl_certificate /etc/letsencrypt/live/hutaroblog.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hutaroblog.com/privkey.pem;

  client_max_body_size 32m;
  client_body_timeout 15s;
  send_timeout 15s;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Static assets cache
  location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|webp|avif|mp4|webm|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # WordPress rewrite
  location / {
    try_files $uri $uri/ /index.php?$args;
  }

  # Deny hidden files except ACME
  location ~ /\. {
    deny all;
  }

  # PHP-FPM (Ubuntu 24.04 default php8.3-fpm)
  location ~ \.php$ {
    include snippets/fastcgi-php.conf;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    fastcgi_connect_timeout 5s;
    fastcgi_read_timeout 30s;
  }
}
